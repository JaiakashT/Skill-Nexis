<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== THEME VARIABLES ===== */
  body.light-theme {
    --bg-top: #7ec8f7;
    --bg-bottom: #fce8c8;
    --text-color: #1f2a38;
    --card-bg: rgba(255, 255, 255, 0.55);
    --card-border: rgba(255, 255, 255, 0.6);
    --input-bg: rgba(255, 255, 255, 0.8);
    --accent: #e08a1e;
    --cloud-color: #ffffff;
    --muted: #5a6675;
  }

  body.dark-theme {
    --bg-top: #0d1b2a;
    --bg-bottom: #1b2a41;
    --text-color: #eef2f7;
    --card-bg: rgba(20, 28, 42, 0.55);
    --card-border: rgba(255, 255, 255, 0.15);
    --input-bg: rgba(255, 255, 255, 0.1);
    --accent: #ffcb5c;
    --cloud-color: #aab6c6;
    --muted: #9aa7b8;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text-color);
    background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    transition: background 0.8s ease, color 0.5s ease;
    min-height: 100vh;
    position: relative;
  }

  /* ===== SKY / BACKGROUND LAYER ===== */
  .sky {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 9%;
    right: 12%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff6cf 0%, #ffd54f 60%, #ffb300 100%);
    box-shadow: 0 0 70px 25px rgba(255, 213, 79, 0.55);
    animation: pulse 4s ease-in-out infinite;
    transition: opacity 0.8s ease;
    opacity: 1;
  }

  body.dark-theme .sun { opacity: 0; }
  body:not(.cond-clear) .sun { opacity: 0.45; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 9%;
    right: 14%;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #e7ecf3;
    box-shadow: -14px 0 0 0 #1b2a41 inset, 0 0 40px 10px rgba(231, 236, 243, 0.35);
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  body.dark-theme .moon { opacity: 1; }
  body.dark-theme:not(.cond-clear) .moon { opacity: 0.5; }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  body.dark-theme .stars { opacity: 1; }

  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Clouds */
  .clouds-layer {
    position: absolute;
    inset: 0;
    opacity: 0.45;
    transition: opacity 0.8s ease, filter 0.8s ease;
  }

  body.cond-clouds .clouds-layer,
  body.cond-mist .clouds-layer { opacity: 0.85; }

  body.cond-rain .clouds-layer,
  body.cond-thunderstorm .clouds-layer,
  body.cond-snow .clouds-layer {
    opacity: 0.9;
    filter: brightness(0.75);
  }

  .cloud {
    position: absolute;
    width: 120px;
    height: 40px;
    background: var(--cloud-color);
    border-radius: 50px;
    opacity: 0.9;
  }

  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: var(--cloud-color);
    border-radius: 50%;
  }

  .cloud::before { width: 60px; height: 60px; top: -28px; left: 15px; }
  .cloud::after  { width: 50px; height: 50px; top: -20px; left: 62px; }

  .cloud1 { top: 14%; left: -200px; transform: scale(0.8);  animation: drift 55s linear infinite; }
  .cloud2 { top: 28%; left: -200px; transform: scale(1.2);  animation: drift 80s linear infinite -20s; }
  .cloud3 { top: 6%;  left: -200px; transform: scale(0.6);  animation: drift 40s linear infinite -10s; }
  .cloud4 { top: 38%; left: -200px; transform: scale(1.4);  animation: drift 95s linear infinite -45s; }

  @keyframes drift {
    from { transform: translateX(0) scale(var(--s, 1)); }
    to   { transform: translateX(140vw) scale(var(--s, 1)); }
  }

  /* Rain */
  .rain-layer {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  body.cond-rain .rain-layer,
  body.cond-thunderstorm .rain-layer { opacity: 1; }

  .drop {
    position: absolute;
    top: -20px;
    width: 2px;
    height: 18px;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.7));
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(115vh); }
  }

  /* Snow */
  .snow-layer {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  body.cond-snow .snow-layer { opacity: 1; }

  .flake {
    position: absolute;
    top: -10px;
    border-radius: 50%;
    background: white;
    animation: snowFall linear infinite;
  }

  @keyframes snowFall {
    0%   { transform: translate(0, -10px); }
    50%  { transform: translate(20px, 50vh); }
    100% { transform: translate(-20px, 115vh); }
  }

  /* Lightning flash */
  .flash-layer {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 1;
    pointer-events: none;
    transition: opacity 0.08s ease;
  }

  .flash-layer.flash-active { opacity: 0.75; }

  /* ===== THEME TOGGLE BUTTON ===== */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 5;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.5s ease;
  }

  .theme-toggle:hover { transform: scale(1.08); }

  /* ===== MAIN APP CONTENT ===== */
  .app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  .app h1 {
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .search-box {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 18px;
  }

  .search-box input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--input-bg);
    color: var(--text-color);
    outline: none;
    backdrop-filter: blur(6px);
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-box button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #1f2a38;
    font-weight: bold;
    cursor: pointer;
    transition: filter 0.2s ease;
  }

  .search-box button:hover { filter: brightness(1.1); }

  .message {
    min-height: 22px;
    margin-bottom: 10px;
    font-size: 0.95rem;
    color: var(--text-color);
  }

  /* Weather Card - glass style */
  .weather-card {
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 30px 35px;
    text-align: center;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    display: none;
  }

  .weather-card.active {
    display: block;
    animation: cardIn 0.5s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .weather-card .city-name { font-size: 1.5rem; font-weight: 700; }
  .weather-card .date { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
  .weather-card .weather-icon { width: 90px; height: 90px; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.25)); }

  .weather-card .temperature {
    font-size: 3.2rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--text-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 4px 0;
  }

  .weather-card .condition {
    font-size: 1.05rem;
    text-transform: capitalize;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .details {
    display: flex;
    justify-content: space-around;
    border-top: 1px solid var(--card-border);
    padding-top: 15px;
  }

  .details div { text-align: center; }
  .details span { display: block; font-size: 1.05rem; font-weight: 700; }
  .details small { color: var(--muted); }

  @media (max-width: 480px) {
    .sun, .moon { width: 60px; height: 60px; top: 6%; right: 8%; }
    .weather-card { padding: 24px 22px; }
  }
</style>
</head>
<body class="light-theme cond-clear">

  <!-- Animated background -->
  <div class="sky">
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="stars" id="starsLayer"></div>
    <div class="clouds-layer">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
      <div class="cloud cloud3"></div>
      <div class="cloud cloud4"></div>
    </div>
    <div class="rain-layer" id="rainLayer"></div>
    <div class="snow-layer" id="snowLayer"></div>
  </div>
  <div class="flash-layer" id="flashLayer"></div>

  <!-- Dark / Light toggle -->
  <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">🌙</button>

  <main class="app">
    <h1>🌤️ Weather App</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
      <button id="searchBtn">Search</button>
    </div>

    <p class="message" id="message"></p>

    <div class="weather-card" id="weatherCard">
      <div class="city-name" id="cityName">--</div>
      <div class="date" id="dateNow">--</div>

      <img src="" alt="Weather icon" class="weather-icon" id="weatherIcon">

      <div class="temperature" id="temperature">--°C</div>
      <div class="condition" id="condition">--</div>

      <div class="details">
        <div><span id="humidity">--%</span><small>Humidity</small></div>
        <div><span id="windSpeed">-- m/s</span><small>Wind</small></div>
        <div><span id="feelsLike">--°C</span><small>Feels Like</small></div>
      </div>
    </div>
  </main>

  <script>
    /* ============ THEME TOGGLE ============ */
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(theme) {
      document.body.classList.remove('light-theme', 'dark-theme');
      document.body.classList.add(theme);
      themeToggle.textContent = theme === 'dark-theme' ? '☀️' : '🌙';
      localStorage.setItem('weatherAppTheme', theme);
    }

    const savedTheme = localStorage.getItem('weatherAppTheme') ||
      (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark-theme' : 'light-theme');
    applyTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark-theme');
      applyTheme(isDark ? 'light-theme' : 'dark-theme');
    });

    /* ============ BACKGROUND ELEMENTS ============ */
    // Stars
    const starsLayer = document.getElementById('starsLayer');
    for (let i = 0; i < 70; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = (Math.random() * 3) + 's';
      starsLayer.appendChild(star);
    }

    // Rain drops
    const rainLayer = document.getElementById('rainLayer');
    for (let i = 0; i < 60; i++) {
      const drop = document.createElement('div');
      drop.className = 'drop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';
      drop.style.animationDelay = (Math.random() * 2) + 's';
      rainLayer.appendChild(drop);
    }

    // Snow flakes
    const snowLayer = document.getElementById('snowLayer');
    for (let i = 0; i < 45; i++) {
      const flake = document.createElement('div');
      flake.className = 'flake';
      const size = 4 + Math.random() * 5;
      flake.style.width = size + 'px';
      flake.style.height = size + 'px';
      flake.style.left = Math.random() * 100 + '%';
      flake.style.opacity = 0.5 + Math.random() * 0.5;
      flake.style.animationDuration = (6 + Math.random() * 6) + 's';
      flake.style.animationDelay = (Math.random() * 5) + 's';
      snowLayer.appendChild(flake);
    }

    // Lightning flash control
    const flashLayer = document.getElementById('flashLayer');
    let lightningTimer = null;

    function triggerFlash() {
      flashLayer.classList.add('flash-active');
      setTimeout(() => flashLayer.classList.remove('flash-active'), 120);
    }

    function startLightning() {
      stopLightning();
      const loop = () => {
        triggerFlash();
        lightningTimer = setTimeout(loop, 3000 + Math.random() * 5000);
      };
      lightningTimer = setTimeout(loop, 1500);
    }

    function stopLightning() {
      clearTimeout(lightningTimer);
      flashLayer.classList.remove('flash-active');
    }

    /* ============ WEATHER CONDITION -> BACKGROUND ============ */
    const condMap = {
      Clear: 'cond-clear',
      Clouds: 'cond-clouds',
      Rain: 'cond-rain',
      Drizzle: 'cond-rain',
      Thunderstorm: 'cond-thunderstorm',
      Snow: 'cond-snow',
      Mist: 'cond-mist', Fog: 'cond-mist', Haze: 'cond-mist', Smoke: 'cond-mist'
    };

    function setWeatherCondition(main) {
      const cls = condMap[main] || 'cond-clouds';
      document.body.classList.remove('cond-clear', 'cond-clouds', 'cond-rain', 'cond-thunderstorm', 'cond-snow', 'cond-mist');
      document.body.classList.add(cls);
      if (cls === 'cond-thunderstorm') startLightning(); else stopLightning();
    }

    /* ============ WEATHER APP LOGIC ============ */
    const API_KEY = "ad3cd30633f7bbf327ac37ecb397d6ac";

    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const weatherCard = document.getElementById('weatherCard');
    const message = document.getElementById('message');

    async function getWeather(city) {
      message.textContent = "Loading...";
      weatherCard.classList.remove('active');

      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

      try {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(response.status === 404 ? "City not found." : "Something went wrong.");
        }

        const data = await response.json();
        displayWeather(data);
        message.textContent = "";

      } catch (error) {
        message.textContent = error.message;
      }
    }

    function displayWeather(data) {
      document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
      document.getElementById('dateNow').textContent = new Date().toLocaleDateString(undefined, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
      document.getElementById('condition').textContent = data.weather[0].description;
      document.getElementById('humidity').textContent = `${data.main.humidity}%`;
      document.getElementById('windSpeed').textContent = `${data.wind.speed} m/s`;
      document.getElementById('feelsLike').textContent = `${Math.round(data.main.feels_like)}°C`;

      const iconCode = data.weather[0].icon;
      document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

      weatherCard.classList.add('active');

      setWeatherCondition(data.weather[0].main);
    }

    searchBtn.addEventListener('click', () => {
      const city = cityInput.value.trim();
      if (city) {
        getWeather(city);
      } else {
        message.textContent = "Please enter a city name.";
      }
    });

    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchBtn.click();
    });

    // Load a default city on page load
    getWeather("Bengaluru");
  </script>

</body>
</html>
