<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMart - Shop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #131921;
    --navy-light: #232f3e;
    --orange: #ff9900;
    --orange-light: #febd69;
    --bg: #f3f4f6;
    --text: #111827;
    --muted: #6b7280;
    --radius: 10px;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  a { text-decoration: none; color: inherit; }

  /* ===== HEADER ===== */
  header {
    background: var(--navy);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--orange-light);
    cursor: pointer;
    white-space: nowrap;
  }

  .logo span { color: white; }

  .search-bar {
    flex: 1;
    display: flex;
    min-width: 180px;
    max-width: 600px;
  }

  .search-bar input {
    flex: 1;
    padding: 10px 14px;
    border: none;
    border-radius: var(--radius) 0 0 var(--radius);
    font-size: 0.95rem;
    outline: none;
  }

  .search-bar button {
    padding: 10px 16px;
    border: none;
    background: var(--orange);
    border-radius: 0 var(--radius) var(--radius) 0;
    cursor: pointer;
    font-weight: bold;
  }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--navy-light);
    padding: 10px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    position: relative;
    white-space: nowrap;
    transition: background 0.2s ease;
  }

  .cart-btn:hover { background: #2e3d50; }

  .cart-count {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--orange);
    color: var(--navy);
    font-size: 0.75rem;
    font-weight: bold;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== CATEGORY BAR ===== */
  .category-bar {
    background: var(--navy-light);
    display: flex;
    gap: 10px;
    padding: 10px 24px;
    overflow-x: auto;
  }

  .category-bar button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    transition: background 0.2s ease;
  }

  .category-bar button.active,
  .category-bar button:hover {
    background: var(--orange);
    color: var(--navy);
    border-color: var(--orange);
  }

  /* ===== MAIN ===== */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .section-title {
    font-size: 1.4rem;
    margin-bottom: 16px;
    font-weight: 600;
  }

  /* Product grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  .product-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }

  .product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }

  .product-info { padding: 14px; flex: 1; display: flex; flex-direction: column; }

  .product-info .category-tag {
    font-size: 0.7rem;
    color: var(--orange);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .product-info .pname {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 6px;
    flex: 1;
  }

  .stars { color: #ffb400; font-size: 0.85rem; margin-bottom: 8px; }
  .stars span { color: var(--muted); }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .price { font-size: 1.1rem; font-weight: 700; color: var(--text); }

  .quick-add {
    background: var(--orange);
    border: none;
    padding: 7px 12px;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.8rem;
  }

  .quick-add:hover { background: var(--orange-light); }

  .no-results { text-align: center; color: var(--muted); padding: 50px 0; font-size: 1.05rem; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal-box {
    background: white;
    border-radius: 14px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    position: relative;
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
    background: none;
    border: none;
    z-index: 2;
  }

  .modal-img {
    flex: 1 1 280px;
    min-height: 260px;
    background: #f3f4f6;
  }

  .modal-img img { width: 100%; height: 100%; object-fit: cover; }

  .modal-details {
    flex: 1 1 320px;
    padding: 30px 28px;
    display: flex;
    flex-direction: column;
  }

  .modal-details .category-tag { color: var(--orange); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }
  .modal-details h2 { margin: 8px 0 10px; font-size: 1.4rem; }
  .modal-details .price { font-size: 1.6rem; margin-bottom: 12px; }
  .modal-details .desc { color: var(--muted); font-size: 0.92rem; line-height: 1.5; margin-bottom: 20px; }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .qty-control {
    display: flex;
    align-items: center;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
  }

  .qty-control button {
    width: 34px;
    height: 34px;
    border: none;
    background: #f3f4f6;
    font-size: 1.1rem;
    cursor: pointer;
  }

  .qty-control span {
    width: 36px;
    text-align: center;
    font-weight: 600;
  }

  .add-to-cart-btn {
    background: var(--orange);
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: auto;
  }

  .add-to-cart-btn:hover { background: var(--orange-light); }

  /* ===== CART VIEW ===== */
  .cart-view { display: none; }
  .cart-view.active { display: block; }
  .shop-view.hidden { display: none; }

  .cart-item {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
  .cart-item-info { flex: 1; }
  .cart-item-info .pname { font-weight: 600; margin-bottom: 4px; }
  .cart-item-info .category-tag { color: var(--orange); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

  .cart-item-actions {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: #d33;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .cart-summary {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .cart-summary .total-row {
    display: flex;
    justify-content: space-between;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .checkout-btn {
    width: 100%;
    background: var(--orange);
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }

  .checkout-btn:hover { background: var(--orange-light); }

  .empty-cart {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-cart button {
    margin-top: 16px;
    background: var(--orange);
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo" id="logoBtn">Mini<span>Mart</span></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products...">
      <button id="searchBtn">🔍</button>
    </div>
    <div class="cart-btn" id="cartBtn">
      🛒 Cart
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </header>

  <!-- Category Bar -->
  <div class="category-bar" id="categoryBar">
    <button class="active" data-cat="All">All</button>
    <button data-cat="Electronics">Electronics</button>
    <button data-cat="Fashion">Fashion</button>
    <button data-cat="Accessories">Accessories</button>
  </div>

  <main>
    <!-- SHOP VIEW -->
    <div class="shop-view" id="shopView">
      <h1 class="section-title">Today's Deals For You</h1>
      <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- CART VIEW -->
    <div class="cart-view" id="cartView">
      <h1 class="section-title">Your Cart</h1>
      <div id="cartItemsContainer"></div>
    </div>
  </main>

  <footer>&copy; 2026 MiniMart — A practice e-commerce front-end project.</footer>

  <!-- Product Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-img"><img id="modalImg" src="" alt=""></div>
      <div class="modal-details">
        <div class="category-tag" id="modalCategory"></div>
        <h2 id="modalName"></h2>
        <div class="price" id="modalPrice"></div>
        <div class="stars" id="modalStars"></div>
        <p class="desc" id="modalDesc"></p>
        <div class="qty-row">
          <span>Quantity:</span>
          <div class="qty-control">
            <button id="qtyMinus">−</button>
            <span id="qtyValue">1</span>
            <button id="qtyPlus">+</button>
          </div>
        </div>
        <button class="add-to-cart-btn" id="addToCartBtn">Add to Cart</button>
      </div>
    </div>
  </div>

  <script>
    /* ============ PRODUCT DATA ============ */
    const products = [
      {
        id: 1, name: "Wireless Bluetooth Headphones", category: "Electronics",
        price: 2499, rating: 4.5,
        image: "https://loremflickr.com/500/500/headphones",
        desc: "Over-ear wireless headphones with active noise cancellation, 30-hour battery life, and deep bass sound — perfect for travel and daily commute."
      },
      {
        id: 2, name: "Smart Fitness Watch", category: "Electronics",
        price: 3499, rating: 4.3,
        image: "https://loremflickr.com/500/500/smartwatch",
        desc: "Track your heart rate, sleep, and workouts with this sleek smartwatch. Water-resistant with a 7-day battery life and customizable watch faces."
      },
      {
        id: 3, name: "Running Sports Shoes", category: "Fashion",
        price: 1999, rating: 4.6,
        image: "https://loremflickr.com/500/500/sneakers",
        desc: "Lightweight breathable running shoes with cushioned soles, designed for comfort on long runs and everyday wear."
      },
      {
        id: 4, name: "Travel Backpack 35L", category: "Accessories",
        price: 1599, rating: 4.4,
        image: "https://loremflickr.com/500/500/backpack",
        desc: "Durable water-resistant backpack with a padded laptop compartment, multiple pockets, and ergonomic straps — built for travel and college."
      },
      {
        id: 5, name: "Polarized Sunglasses", category: "Fashion",
        price: 899, rating: 4.1,
        image: "https://loremflickr.com/500/500/sunglasses",
        desc: "UV-protected polarized sunglasses with a lightweight frame, reducing glare for clearer vision on sunny days."
      },
      {
        id: 6, name: "DSLR Camera", category: "Electronics",
        price: 45999, rating: 4.8,
        image: "https://loremflickr.com/500/500/dslrcamera",
        desc: "Capture stunning photos and videos with this entry-level DSLR camera, featuring a 24MP sensor and interchangeable lens support."
      },
      {
        id: 7, name: "Portable Bluetooth Speaker", category: "Electronics",
        price: 1799, rating: 4.2,
        image: "https://loremflickr.com/500/500/speaker",
        desc: "Compact and powerful Bluetooth speaker with rich bass, 12-hour playtime, and splash resistance for outdoor use."
      },
      {
        id: 8, name: "Leather Wallet", category: "Accessories",
        price: 699, rating: 4.5,
        image: "https://loremflickr.com/500/500/leatherwallet",
        desc: "Genuine leather bi-fold wallet with multiple card slots and a slim profile that fits comfortably in any pocket."
      }
    ];

    /* ============ STATE ============ */
    let cart = JSON.parse(localStorage.getItem('miniMartCart')) || [];
    let currentCategory = 'All';
    let currentSearch = '';
    let activeModalProduct = null;
    let modalQty = 1;

    /* ============ ELEMENTS ============ */
    const productGrid = document.getElementById('productGrid');
    const cartCount = document.getElementById('cartCount');
    const shopView = document.getElementById('shopView');
    const cartView = document.getElementById('cartView');
    const cartItemsContainer = document.getElementById('cartItemsContainer');
    const modalOverlay = document.getElementById('modalOverlay');

    /* ============ RENDER STARS ============ */
    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let html = '★'.repeat(full);
      if (half) html += '½';
      html += `<span> (${rating})</span>`;
      return html;
    }

    /* ============ RENDER PRODUCT GRID ============ */
    function renderProducts() {
      let filtered = products.filter(p => currentCategory === 'All' || p.category === currentCategory);
      if (currentSearch.trim()) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(currentSearch.toLowerCase()));
      }

      if (filtered.length === 0) {
        productGrid.innerHTML = `<div class="no-results">No products found. Try a different search or category.</div>`;
        return;
      }

      productGrid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img src="${p.image}" alt="${p.name}">
          <div class="product-info">
            <div class="category-tag">${p.category}</div>
            <div class="pname">${p.name}</div>
            <div class="stars">${renderStars(p.rating)}</div>
            <div class="price-row">
              <div class="price">₹${p.price.toLocaleString()}</div>
              <button class="quick-add" data-id="${p.id}">+ Cart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    /* ============ MODAL ============ */
    function openModal(productId) {
      activeModalProduct = products.find(p => p.id === productId);
      modalQty = 1;
      document.getElementById('modalImg').src = activeModalProduct.image;
      document.getElementById('modalImg').alt = activeModalProduct.name;
      document.getElementById('modalCategory').textContent = activeModalProduct.category;
      document.getElementById('modalName').textContent = activeModalProduct.name;
      document.getElementById('modalPrice').textContent = `₹${activeModalProduct.price.toLocaleString()}`;
      document.getElementById('modalStars').innerHTML = renderStars(activeModalProduct.rating);
      document.getElementById('modalDesc').textContent = activeModalProduct.desc;
      document.getElementById('qtyValue').textContent = modalQty;
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      activeModalProduct = null;
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.getElementById('qtyMinus').addEventListener('click', () => {
      if (modalQty > 1) modalQty--;
      document.getElementById('qtyValue').textContent = modalQty;
    });

    document.getElementById('qtyPlus').addEventListener('click', () => {
      modalQty++;
      document.getElementById('qtyValue').textContent = modalQty;
    });

    document.getElementById('addToCartBtn').addEventListener('click', () => {
      if (activeModalProduct) {
        addToCart(activeModalProduct.id, modalQty);
        closeModal();
      }
    });

    /* ============ CART LOGIC ============ */
    function saveCart() {
      localStorage.setItem('miniMartCart', JSON.stringify(cart));
    }

    function addToCart(productId, qty) {
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.qty += qty;
      } else {
        cart.push({ id: productId, qty: qty });
      }
      saveCart();
      updateCartCount();
    }

    function changeCartQty(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== productId);
      }
      saveCart();
      updateCartCount();
      renderCart();
    }

    function removeFromCart(productId) {
      cart = cart.filter(i => i.id !== productId);
      saveCart();
      updateCartCount();
      renderCart();
    }

    function updateCartCount() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      cartCount.textContent = totalQty;
    }

    function renderCart() {
      if (cart.length === 0) {
        cartItemsContainer.innerHTML = `
          <div class="empty-cart">
            <p>Your cart is empty.</p>
            <button id="continueShoppingBtn">Continue Shopping</button>
          </div>`;
        document.getElementById('continueShoppingBtn').addEventListener('click', showShopView);
        return;
      }

      let subtotal = 0;
      const rows = cart.map(item => {
        const product = products.find(p => p.id === item.id);
        const lineTotal = product.price * item.qty;
        subtotal += lineTotal;
        return `
          <div class="cart-item">
            <img src="${product.image}" alt="${product.name}">
            <div class="cart-item-info">
              <div class="category-tag">${product.category}</div>
              <div class="pname">${product.name}</div>
              <div>₹${product.price.toLocaleString()} each</div>
            </div>
            <div class="cart-item-actions">
              <div class="qty-control">
                <button onclick="changeCartQty(${product.id}, -1)">−</button>
                <span>${item.qty}</span>
                <button onclick="changeCartQty(${product.id}, 1)">+</button>
              </div>
              <strong>₹${lineTotal.toLocaleString()}</strong>
              <button class="remove-btn" onclick="removeFromCart(${product.id})">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      cartItemsContainer.innerHTML = rows + `
        <div class="cart-summary">
          <div class="total-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
          <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        </div>
      `;

      document.getElementById('checkoutBtn').addEventListener('click', checkout);
    }

    function checkout() {
      const subtotal = cart.reduce((sum, item) => {
        const product = products.find(p => p.id === item.id);
        return sum + product.price * item.qty;
      }, 0);
      alert(`Thank you for your order! Total: ₹${subtotal.toLocaleString()}\n(This is a demo — no real payment was made.)`);
      cart = [];
      saveCart();
      updateCartCount();
      renderCart();
    }

    // Expose functions used in inline onclick handlers
    window.changeCartQty = changeCartQty;
    window.removeFromCart = removeFromCart;

    /* ============ VIEW SWITCHING ============ */
    function showShopView() {
      shopView.classList.remove('hidden');
      cartView.classList.remove('active');
    }

    function showCartView() {
      shopView.classList.add('hidden');
      cartView.classList.add('active');
      renderCart();
    }

    document.getElementById('cartBtn').addEventListener('click', showCartView);
    document.getElementById('logoBtn').addEventListener('click', showShopView);

    /* ============ EVENT DELEGATION: PRODUCT GRID ============ */
    productGrid.addEventListener('click', (e) => {
      const quickAddBtn = e.target.closest('.quick-add');
      if (quickAddBtn) {
        e.stopPropagation();
        addToCart(Number(quickAddBtn.dataset.id), 1);
        quickAddBtn.textContent = "Added ✓";
        setTimeout(() => quickAddBtn.textContent = "+ Cart", 900);
        return;
      }
      const card = e.target.closest('.product-card');
      if (card) {
        openModal(Number(card.dataset.id));
      }
    });

    /* ============ CATEGORY FILTER ============ */
    document.getElementById('categoryBar').addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('.category-bar button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.cat;
        renderProducts();
      }
    });

    /* ============ SEARCH ============ */
    const searchInput = document.getElementById('searchInput');
    document.getElementById('searchBtn').addEventListener('click', () => {
      currentSearch = searchInput.value;
      renderProducts();
    });
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        currentSearch = searchInput.value;
        renderProducts();
      }
    });
    searchInput.addEventListener('input', () => {
      currentSearch = searchInput.value;
      renderProducts();
    });

    /* ============ INIT ============ */
    renderProducts();
    updateCartCount();
  </script>

</body>
</html>
